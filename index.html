<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 19th Birthday, Kei! 🌷</title>

  <!-- React 18 + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-50:   #FFF0F5;
      --pink-100:  #FFD6E7;
      --pink-200:  #FFB6C1;
      --pink-300:  #F48FB1;
      --pink-400:  #E91E8C;
      --pink-500:  #C2185B;
      --pink-blush:#FCE4EC;
      --gold:      #FFD700;
      --gold-dark: #C8960C;
      --green:     #5D8A55;
      --leaf:      #6AAE62;
      --text-deep: #4A0030;
      --text-mid:  #880E4F;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(160deg, var(--pink-50) 0%, #FFF8FB 40%, var(--pink-blush) 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text-deep);
    }

    /* ─── Top accent bar ─── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(to right,
        var(--pink-300), var(--pink-400), var(--pink-500),
        var(--gold), var(--pink-500), var(--pink-400), var(--pink-300));
      z-index: 200;
    }

    /* ─── Floating petals ─── */
    .petals-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      top: -60px;
      animation: petalFall linear infinite;
      user-select: none;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0)     rotate(0deg)   translateX(0px);  opacity: 0.75; }
      25%  { transform: translateY(25vh)  rotate(90deg)  translateX(28px);  }
      50%  { transform: translateY(50vh)  rotate(180deg) translateX(-20px); }
      75%  { transform: translateY(75vh)  rotate(270deg) translateX(22px);  }
      100% { transform: translateY(108vh) rotate(360deg) translateX(0px);  opacity: 0.15; }
    }

    /* ─── Hero ─── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 70px 24px 50px;
      text-align: center;
    }

    .hero-inner { max-width: 680px; position: relative; z-index: 2; }

    .hero-flowers-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .flower-sway {
      display: inline-block;
      animation: sway 4s ease-in-out infinite;
      transform-origin: 50% 100%;
    }
    .flower-sway:nth-child(even) { animation-direction: reverse; animation-delay: 1.2s; }
    .flower-sway:nth-child(3n)   { animation-delay: 0.6s; }
    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg);  }
    }

    .pre-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      color: var(--pink-400);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .main-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 9vw, 6.5rem);
      color: var(--pink-500);
      line-height: 1.05;
      margin-bottom: 8px;
      animation: titleGlow 3.5s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 2px 12px rgba(194, 24, 91, 0.25); }
      50%       { text-shadow: 0 4px 28px rgba(194, 24, 91, 0.55), 0 0 50px rgba(233, 30, 140, 0.18); }
    }

    .name-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #FFD700 0%, #C8960C 40%, #FFD700 70%, #E8B800 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 8px rgba(200, 150, 12, 0.45));
      animation: goldShimmer 3s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes goldShimmer {
      0%   { background-position: 0%   center; }
      100% { background-position: 200% center; }
    }

    .sparkles-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
    }
    .sparkle {
      font-size: 1.6rem;
      animation: sparkle 2.2s ease-in-out infinite;
    }
    .sparkle:nth-child(2) { animation-delay: 0.35s; }
    .sparkle:nth-child(3) { animation-delay: 0.7s; }
    .sparkle:nth-child(4) { animation-delay: 1.05s; }
    .sparkle:nth-child(5) { animation-delay: 1.4s; }
    @keyframes sparkle {
      0%, 100% { transform: scale(1)    rotate(0deg);  opacity: 1;   }
      50%       { transform: scale(1.45) rotate(18deg); opacity: 0.75; }
    }

    .age-badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
      color: #fff;
      padding: 13px 32px;
      border-radius: 100px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      box-shadow: 0 5px 22px rgba(194, 24, 91, 0.4);
      margin: 18px auto 14px;
      animation: floatBadge 4.5s ease-in-out infinite;
    }
    @keyframes floatBadge {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    .hero-sub {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--text-mid);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ─── Side flower columns ─── */
    .side-flowers {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .side-flowers.left  { left: 28px; }
    .side-flowers.right { right: 28px; }
    @media (max-width: 960px) { .side-flowers { display: none; } }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 380px;
      margin: 0 auto 44px;
      padding: 0 20px;
    }
    .divider-line {
      flex: 1;
      height: 1.5px;
      background: linear-gradient(to right, transparent, var(--pink-200), transparent);
    }

    /* ─── Section wrapper ─── */
    .section-wrap {
      position: relative;
      z-index: 1;
      padding: 50px 24px 30px;
      max-width: 1080px;
      margin: 0 auto;
    }

    .section-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 5vw, 3.4rem);
      color: var(--pink-400);
      text-align: center;
      margin-bottom: 6px;
    }
    .section-sub {
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: var(--text-mid);
      text-align: center;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 38px;
    }

    /* ─── Photo gallery ─── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 780px) {
      .gallery-grid {
        grid-template-columns: 1fr;
        max-width: 360px;
        margin: 0 auto;
      }
    }

    .photo-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      border: 3px solid var(--pink-100);
      box-shadow: 0 8px 28px rgba(233, 30, 140, 0.13);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      position: relative;
    }
    .photo-card:hover {
      transform: translateY(-10px) rotate(1.2deg);
      box-shadow: 0 18px 44px rgba(233, 30, 140, 0.24);
    }
    .photo-card:nth-child(2):hover { transform: translateY(-10px) rotate(-1.2deg); }
    .photo-card:nth-child(3):hover { transform: translateY(-10px) rotate(1deg);    }

    .photo-corner {
      position: absolute;
      font-size: 1.15rem;
      opacity: 0.45;
      z-index: 5;
    }
    .pc-tl { top: 7px;  left: 7px;  }
    .pc-tr { top: 7px;  right: 7px; }

    .photo-frame {
      position: relative;
      width: 100%;
      padding-bottom: 120%;
      background: var(--pink-blush);
      overflow: hidden;
    }
    .photo-frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: linear-gradient(145deg, var(--pink-blush), var(--pink-100));
    }
    .placeholder-icon { font-size: 3.5rem; opacity: 0.45; }
    .placeholder-text {
      font-size: 0.82rem;
      color: var(--pink-400);
      opacity: 0.75;
      text-align: center;
      padding: 0 18px;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .photo-caption {
      padding: 14px 16px 18px;
      text-align: center;
      border-top: 2px solid var(--pink-50);
    }
    .caption-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.3rem;
      color: var(--pink-500);
    }
    .caption-date {
      font-size: 0.78rem;
      color: var(--text-mid);
      margin-top: 4px;
      font-weight: 300;
      letter-spacing: 0.12em;
    }

    /* ─── Wishes section ─── */
    .wishes-card {
      background: #fff;
      border-radius: 26px;
      padding: clamp(28px, 5vw, 50px) clamp(22px, 6vw, 56px);
      text-align: center;
      box-shadow: 0 10px 44px rgba(233, 30, 140, 0.1);
      border: 2px solid var(--pink-100);
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }
    .wishes-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(to right,
        var(--pink-300), var(--pink-400), var(--pink-500),
        var(--gold), var(--pink-500), var(--pink-400), var(--pink-300));
    }
    .wishes-flowers-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 26px;
      align-items: flex-end;
    }
    .wishes-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 1.9vw, 1.12rem);
      line-height: 2;
      color: var(--text-deep);
      margin-bottom: 26px;
    }
    .wishes-sig {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: var(--pink-400);
    }
    .hearts-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      font-size: 1.6rem;
    }
    .heart { animation: heartbeat 1.8s ease-in-out infinite; }
    .heart:nth-child(2) { animation-delay: 0.4s; }
    .heart:nth-child(3) { animation-delay: 0.8s; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1);   }
      25%       { transform: scale(1.25); }
      50%       { transform: scale(1);   }
      75%       { transform: scale(1.12); }
    }

    /* ─── Footer ─── */
    .site-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px 20px 48px;
      color: var(--text-mid);
    }
    .footer-flowers-row {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 16px;
    }
    .footer-made {
      font-family: 'Dancing Script', cursive;
      font-size: 1.2rem;
      color: var(--pink-400);
    }
    .footer-date {
      font-size: 0.82rem;
      opacity: 0.55;
      margin-top: 5px;
      letter-spacing: 0.1em;
    }

    /* ─── Fade-in on scroll ─── */
    .fade-section {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .fade-section.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ══════════════════════════════════════
       SVG: Tulip
    ══════════════════════════════════════ */
    const Tulip = ({ width = 52, color = '#E91E8C', light = '#F48FB1' }) => (
      <svg width={width} height={Math.round(width * 1.68)} viewBox="0 0 55 92" fill="none">
        {/* stem */}
        <path d="M27.5 92 L27.5 53" stroke="#5D8A55" strokeWidth="3.5" strokeLinecap="round"/>
        {/* leaf left */}
        <path d="M27.5 70 C19 62 10 54 7 41 C19 45 27 59 27.5 70Z" fill="#6AAE62"/>
        {/* leaf right */}
        <path d="M27.5 63 C36 55 46 49 49 37 C37 41 28 55 27.5 63Z" fill="#7BC97A" opacity="0.82"/>
        {/* petal center */}
        <path d="M27.5 53 C23 37 23 21 27.5 8 C32 21 32 37 27.5 53Z" fill={color}/>
        {/* petal left */}
        <path d="M27.5 53 C14 41 11 23 20 8 C26 25 27.5 43 27.5 53Z" fill={light}/>
        {/* petal right */}
        <path d="M27.5 53 C41 41 44 23 35 8 C29 25 27.5 43 27.5 53Z" fill={light}/>
      </svg>
    );

    /* ══════════════════════════════════════
       SVG: Lily
    ══════════════════════════════════════ */
    const Lily = ({ width = 60, color = '#FFB6C1', accent = '#FF69B4' }) => {
      const cx = 30, cy = 35;
      const angles = [0, 60, 120, 180, 240, 300];
      return (
        <svg width={width} height={Math.round(width * 1.5)} viewBox="0 0 60 90" fill="none">
          {/* stem */}
          <path d="M30 90 L30 52" stroke="#5D8A55" strokeWidth="3.5" strokeLinecap="round"/>
          {/* leaf */}
          <path d="M30 68 C22 60 13 52 10 40 C22 44 30 58 30 68Z" fill="#6AAE62"/>
          {/* petals — one path rotated 6 ways around center */}
          {angles.map(a => (
            <path
              key={a}
              d={`M ${cx} ${cy} C ${cx-9} ${cy-7}, ${cx-9} ${cy-19}, ${cx} ${cy-23}
                  C ${cx+9} ${cy-19}, ${cx+9} ${cy-7}, ${cx} ${cy} Z`}
              fill={color}
              stroke={accent}
              strokeWidth="0.6"
              opacity="0.92"
              transform={`rotate(${a}, ${cx}, ${cy})`}
            />
          ))}
          {/* center */}
          <circle cx={cx} cy={cy} r="6"   fill="#FFD700" opacity="0.95"/>
          <circle cx={cx} cy={cy} r="3.2" fill="#F4C430"/>
          {/* stamens */}
          {angles.map(a => {
            const rad = (a - 90) * Math.PI / 180;
            const ex = (cx + Math.cos(rad) * 13).toFixed(1);
            const ey = (cy + Math.sin(rad) * 13).toFixed(1);
            return (
              <g key={a}>
                <line x1={cx} y1={cy} x2={ex} y2={ey} stroke="#C8960C" strokeWidth="1.1" opacity="0.75"/>
                <circle cx={ex} cy={ey} r="1.8" fill="#C8960C" opacity="0.75"/>
              </g>
            );
          })}
        </svg>
      );
    };

    /* ══════════════════════════════════════
       Floating petals background
    ══════════════════════════════════════ */
    const PETAL_EMOJIS = ['🌸', '🌺', '🌷', '💮', '🌸', '🌹'];
    const FloatingPetals = () => {
      const petals = Array.from({ length: 20 }, (_, i) => ({
        id: i,
        left:     `${(i * 5.3 + Math.random() * 5) % 100}%`,
        size:     `${(Math.random() * 0.9 + 0.8).toFixed(2)}rem`,
        duration: `${(Math.random() * 9 + 7).toFixed(1)}s`,
        delay:    `${(Math.random() * 12).toFixed(1)}s`,
        emoji:    PETAL_EMOJIS[i % PETAL_EMOJIS.length],
        opacity:  (Math.random() * 0.35 + 0.3).toFixed(2),
      }));
      return (
        <div className="petals-wrap">
          {petals.map(p => (
            <div key={p.id} className="petal" style={{
              left: p.left,
              fontSize: p.size,
              animationDuration: p.duration,
              animationDelay: p.delay,
              opacity: p.opacity,
            }}>{p.emoji}</div>
          ))}
        </div>
      );
    };

    /* ══════════════════════════════════════
       Flower divider
    ══════════════════════════════════════ */
    const FlowerDivider = () => (
      <div className="divider">
        <div className="divider-line"/>
        <span style={{ fontSize: '1.6rem' }}>🌷</span>
        <span style={{ fontSize: '1.2rem' }}>🌸</span>
        <span style={{ fontSize: '1.6rem' }}>🌷</span>
        <div className="divider-line"/>
      </div>
    );

    /* ══════════════════════════════════════
       Photo card
    ══════════════════════════════════════ */
    const PhotoCard = ({ src, caption, date, placeholderIcon }) => {
      const [imgError, setImgError] = useState(false);
      return (
        <div className="photo-card">
          <span className="photo-corner pc-tl">🌸</span>
          <span className="photo-corner pc-tr">🌸</span>
          <div className="photo-frame">
            {src && !imgError
              ? <img src={src} alt={caption} onError={() => setImgError(true)}/>
              : (
                <div className="photo-placeholder">
                  <div className="placeholder-icon">{placeholderIcon}</div>
                  <div className="placeholder-text">
                    Place your photo here<br/>
                    <span style={{ fontSize: '0.75rem', opacity: 0.65 }}>(add image to /photos folder)</span>
                  </div>
                </div>
              )
            }
          </div>
          <div className="photo-caption">
            <div className="caption-title">{caption}</div>
            <div className="caption-date">{date}</div>
          </div>
        </div>
      );
    };

    /* ══════════════════════════════════════
       Intersection-observer fade hook
    ══════════════════════════════════════ */
    const useFadeIn = () => {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) el.classList.add('visible'); },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    };

    /* ══════════════════════════════════════
       Hero section
    ══════════════════════════════════════ */
    const Hero = () => (
      <div className="hero">
        {/* left column flowers */}
        <div className="side-flowers left">
          <div className="flower-sway"><Tulip width={48} color="#C2185B" light="#F48FB1"/></div>
          <div className="flower-sway"><Lily  width={44} color="#FFB6C1" accent="#FF69B4"/></div>
          <div className="flower-sway"><Tulip width={38} color="#E91E8C" light="#F06292"/></div>
        </div>

        <div className="hero-inner">
          {/* flower row */}
          <div className="hero-flowers-row">
            <div className="flower-sway"><Tulip width={36} color="#C2185B" light="#F48FB1"/></div>
            <div className="flower-sway"><Lily  width={42} color="#FFB6C1" accent="#FF69B4"/></div>
            <div className="flower-sway"><Tulip width={50} color="#E91E8C" light="#F06292"/></div>
            <div className="flower-sway"><Lily  width={46} color="#FF69B4" accent="#E91E8C"/></div>
            <div className="flower-sway"><Tulip width={38} color="#C2185B" light="#F48FB1"/></div>
          </div>

          <p className="pre-title">✨ It's finally here ✨</p>
          <h1 className="main-title">Happy Birthday!</h1>
          <h2 className="name-title">Kei</h2>

          <div className="sparkles-row">
            <span className="sparkle">✨</span>
            <span className="sparkle">⭐</span>
            <span className="sparkle">💫</span>
            <span className="sparkle">⭐</span>
            <span className="sparkle">✨</span>
          </div>

          <div className="age-badge">
            <span>🎂</span>
            <span>April 22, 2026 &nbsp;·&nbsp; 19 Years Old</span>
            <span>🎂</span>
          </div>

          <p className="hero-sub">Wishing you the most magical 19th birthday</p>
        </div>

        {/* right column flowers */}
        <div className="side-flowers right">
          <div className="flower-sway"><Lily  width={44} color="#FF69B4" accent="#E91E8C"/></div>
          <div className="flower-sway"><Tulip width={50} color="#E91E8C" light="#F06292"/></div>
          <div className="flower-sway"><Lily  width={40} color="#FFB6C1" accent="#FF69B4"/></div>
        </div>
      </div>
    );

    /* ══════════════════════════════════════
       Gallery section
    ══════════════════════════════════════ */
    const Gallery = () => {
      const ref = useFadeIn();
      return (
        <div className="section-wrap fade-section" ref={ref}>
          <FlowerDivider/>
          <h2 className="section-title">Precious Memories</h2>
          <p className="section-sub">Moments that shine like flowers in bloom</p>
          <div className="gallery-grid">
            <PhotoCard
              src="photos/photo1.jpeg"
              caption="Our Sweetest Moments"
              date="Cherished Forever"
              placeholderIcon="🌷"
            />
            <PhotoCard
              src="photos/photo2.jpeg"
              caption="Beautiful Days"
